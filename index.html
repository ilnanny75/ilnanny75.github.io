<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoxHome 75 - Ultimate Edition</title>
    <style>
        :root {
            --bg: #11111b; --card: #1e1e2e; --text: #cdd6f4;
            --accent: #fab387; --subtext: #a6adc8; --danger: #f38ba8;
        }
        body {
            font-family: 'Segoe UI', sans-serif; background-color: var(--bg);
            color: var(--text); margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        h1 { color: var(--accent); margin-bottom: 20px; }

        .search-area {
            display: flex; background: var(--card); padding: 12px 25px;
            border-radius: 50px; border: 1px solid #313244;
            margin-bottom: 40px; width: 100%; max-width: 650px; gap: 15px;
        }
        .search-area select, .search-area input {
            background: none; color: white; border: none; outline: none; font-size: 1.1rem;
        }
        .search-area select { color: var(--accent); font-weight: bold; cursor: pointer; }

        .dashboard {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px; width: 100%; max-width: 1200px;
        }
        .section {
            background: var(--card); padding: 20px; border-radius: 20px;
            border: 1px solid #313244; position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .section h2 {
            margin: 0 0 15px 0; font-size: 1rem; color: var(--accent);
            border-bottom: 1px solid #313244; padding-bottom: 10px; text-transform: uppercase;
        }
        .links-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }

        .link-item {
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; color: var(--text); font-size: 0.75rem;
            position: relative; transition: transform 0.2s; text-align: center;
        }
        .link-item:hover { transform: translateY(-3px); color: var(--accent); }
        .link-item img {
            width: 45px; height: 45px; border-radius: 12px;
            background: #fff; padding: 5px; margin-bottom: 6px;
        }

        .del-btn {
            position: absolute; top: -5px; right: 5px; background: var(--danger);
            color: white; border-radius: 50%; width: 18px; height: 18px;
            font-size: 12px; display: none; justify-content: center; align-items: center; cursor: pointer; z-index: 10;
        }
        .add-btn-small {
            grid-column: span 4; text-align: center; padding: 10px;
            border: 1px dashed var(--subtext); border-radius: 10px;
            cursor: pointer; font-size: 0.8rem; display: none; margin-top: 10px; color: var(--accent);
        }

        .footer-tools {
            margin-top: 50px; padding: 20px; display: flex; flex-wrap: wrap;
            gap: 20px; justify-content: center; opacity: 0.7;
        }
        .tool-link { color: var(--subtext); cursor: pointer; font-size: 0.9rem; font-weight: bold; }
        .tool-link:hover { color: var(--accent); }

        #admin-box {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--card); padding: 25px; border-radius: 20px;
            border: 2px solid var(--accent); z-index: 100; width: 320px; box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        #admin-box input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: 1px solid #45475a; background: #11111b; color: white; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; background: var(--accent); color: var(--bg); margin-top: 10px; }
    </style>
</head>
<body>

    <h1>FoxHome 75</h1>

    <div class="search-area">
        <select id="engine">
            <option value="https://www.google.com/search?q=">Google</option>
            <option value="https://duckduckgo.com/?q=">DuckDuckGo</option>
            <option value="https://it.wikipedia.org/wiki/Speciale:Ricerca?search=">Wikipedia</option>
            <option value="https://www.youtube.com/results?search_query=">YouTube</option>
        </select>
        <input type="text" id="search-q" placeholder="Cerca..." onkeydown="if(event.key==='Enter') doSearch()">
        <span onclick="doSearch()" style="cursor:pointer">🔍</span>
    </div>

    <div class="dashboard" id="board"></div>

    <div class="footer-tools">
        <span class="tool-link" onclick="toggleEditMode()">✏️ Modifica</span>
        <span class="tool-link" onclick="openNewCatModal()">📂 Nuova Sezione</span>
        <span class="tool-link" onclick="exportJSON()">💾 Salva JSON</span>
        <span class="tool-link" onclick="document.getElementById('file-in').click()">📂 Carica JSON</span>
        <span class="tool-link" onclick="document.getElementById('fav-in').click()">⭐ Importa Browser</span>
        <span class="tool-link" style="color:var(--danger)" onclick="resetAll()">🗑️ Reset</span>

        <input type="file" id="file-in" style="display:none" accept=".json" onchange="importJSON(event)">
        <input type="file" id="fav-in" style="display:none" accept=".html" onchange="importBrowserBookmarks(event)">
    </div>

    <div id="admin-box">
        <h3 id="modal-title" style="margin:0; color:var(--accent)">Aggiungi</h3>
        <div id="site-fields">
            <input type="text" id="new-name" placeholder="Nome Sito">
            <input type="text" id="new-url" placeholder="URL (es: google.it)">
        </div>
        <div id="cat-fields" style="display:none">
            <input type="text" id="new-cat-name" placeholder="Nome nuova sezione">
        </div>
        <input type="hidden" id="target-cat">
        <button class="btn-main" onclick="saveData()">Salva</button>
        <button class="btn-main" style="background:#45475a; color:white" onclick="closeModal()">Annulla</button>
    </div>

    <script>
        const defaultData = {
            "Preferiti": [{name:"Wikipedia", url:"https://wikipedia.org"}],
            "Dev": [{name:"GitHub", url:"https://github.com"}, {name:"Gnome Look", url:"https://www.gnome-look.org"}],
            "Social": [{name:"YouTube", url:"https://youtube.com"}, {name:"Reddit", url:"https://reddit.com"}],
            "Email": [{name:"Gmail", url:"https://gmail.com"}, {name:"Tuta", url:"https://tuta.com"}],
            "A.I.": [{name:"Gemini", url:"https://gemini.google.com"}, {name:"ChatGPT", url:"https://chatgpt.com"}],
            "Ricerca": [{name:"Google", url:"https://google.com"}, {name:"DuckDuckGo", url:"https://duckduckgo.com"}]
        };

        let myData = JSON.parse(localStorage.getItem('foxhome_final_v10')) || defaultData;
        let isEditMode = false;

        function render() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            for (const [cat, links] of Object.entries(myData)) {
                const section = document.createElement('div');
                section.className = 'section';
                section.innerHTML = `<h2>${cat}</h2><div class="links-grid"></div>`;
                const grid = section.querySelector('.links-grid');
                links.forEach((link, idx) => {
                    const domain = new URL(link.url).hostname;
                    grid.innerHTML += `
                        <div class="link-item">
                            <div class="del-btn" style="display:${isEditMode?'flex':'none'}" onclick="deleteLink('${cat}', ${idx})">✕</div>
                            <a href="${link.url}" target="_blank" class="link-item">
                                <img src="https://www.google.com/s2/favicons?domain=${domain}&sz=128" onerror="this.src='https://cdn-icons-png.flaticon.com/128/1006/1006771.png'">
                                <span>${link.name}</span>
                            </a>
                        </div>`;
                });
                grid.innerHTML += `<div class="add-btn-small" style="display:${isEditMode?'block':'none'}" onclick="openAddModal('${cat}')">+ Aggiungi a ${cat}</div>`;
                board.appendChild(section);
            }
            localStorage.setItem('foxhome_final_v10', JSON.stringify(myData));
        }

        function doSearch() {
            const engine = document.getElementById('engine').value;
            const q = document.getElementById('search-q').value;
            if(q) window.open(engine + encodeURIComponent(q), '_blank');
        }

        function toggleEditMode() { isEditMode = !isEditMode; render(); }
        function openAddModal(cat) {
            document.getElementById('modal-title').innerText = "Aggiungi a " + cat;
            document.getElementById('site-fields').style.display = 'block';
            document.getElementById('cat-fields').style.display = 'none';
            document.getElementById('target-cat').value = cat;
            document.getElementById('admin-box').style.display = 'block';
        }
        function openNewCatModal() {
            document.getElementById('modal-title').innerText = "Crea Nuova Sezione";
            document.getElementById('site-fields').style.display = 'none';
            document.getElementById('cat-fields').style.display = 'block';
            document.getElementById('target-cat').value = "NEW";
            document.getElementById('admin-box').style.display = 'block';
        }
        function closeModal() { document.getElementById('admin-box').style.display = 'none'; }

        function saveData() {
            const target = document.getElementById('target-cat').value;
            if(target === "NEW") {
                const name = document.getElementById('new-cat-name').value;
                if(name) myData[name] = [];
            } else {
                const name = document.getElementById('new-name').value;
                let url = document.getElementById('new-url').value;
                if(name && url) {
                    if(!url.startsWith('http')) url = 'https://' + url;
                    myData[target].push({name, url});
                }
            }
            render(); closeModal();
        }

        function deleteLink(cat, idx) {
            myData[cat].splice(idx, 1);
            if(myData[cat].length === 0) delete myData[cat];
            render();
        }

        function exportJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(myData, null, 2));
            const a = document.createElement('a'); a.href = dataStr; a.download = "foxhome_backup.json"; a.click();
        }

        function importJSON(e) {
            const reader = new FileReader();
            reader.onload = (ev) => { myData = JSON.parse(ev.target.result); render(); };
            reader.readAsText(e.target.files[0]);
        }

        function importBrowserBookmarks(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const doc = new DOMParser().parseFromString(event.target.result, 'text/html');
                doc.querySelectorAll('dt h3').forEach(h3 => {
                    const cat = h3.innerText;
                    const links = h3.parentElement.querySelectorAll('dd a');
                    if(links.length > 0) {
                        if(!myData[cat]) myData[cat] = [];
                        links.forEach(l => myData[cat].push({ name: l.innerText, url: l.href }));
                    }
                });
                render();
            };
            reader.readAsText(e.target.files[0]);
        }

        function resetAll() { if(confirm("Ripristinare i siti originali?")) { myData = defaultData; render(); } }

        render();
    </script>
</body>
</html>
